openapi: 3.0.3
info:
  title: devos.ing Server API
  version: 0.1.0
  description: Implemented HTTP routes for the Express-backed server.
servers:
  - url: http://localhost:3001
tags:
  - name: Health
  - name: CLI
  - name: Read Models
  - name: Board
  - name: Notifications
paths:
  /health:
    get:
      tags: [Health]
      responses:
        '200':
          description: Server health.
  /api/cli/history:
    get:
      tags: [CLI]
      responses:
        '200':
          description: In-memory CLI execution history.
  /api/cli/dispatch:
    post:
      tags: [CLI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CliDispatchRequest'
      responses:
        '200':
          description: CLI dispatch result.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/token-usage:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Token usage rows.
  /api/jobs:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Job rows.
  /api/command-history:
    get:
      tags: [Read Models]
      responses:
        '200':
          description: Command history rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommandHistoryRecord'
  /api/project-boards:
    get:
      tags: [Read Models]
      summary: Read project board records
      responses:
        '200':
          description: Project board rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectBoardRecord'
  /api/board-projects:
    get:
      tags: [Read Models]
      summary: Read board project records
      responses:
        '200':
          description: Board project rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardProjectRecord'
  /api/board-tasks:
    get:
      tags: [Read Models]
      summary: Read board task records
      responses:
        '200':
          description: Board task rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardTaskRecord'
components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        minLength: 1
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    TypedError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TypedError'
  schemas:
    TypedError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    CliDispatchRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          minLength: 1
      additionalProperties: true
    AgentCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, backend, model, createdAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
    AgentUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/AgentPatchFields'
        - minProperties: 1
    AgentPatchFields:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
    SkillCreateRequest:
      type: object
      additionalProperties: false
      required: [id, name, description, source, updatedAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        source: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
    SkillUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/SkillPatchFields'
        - minProperties: 1
    SkillPatchFields:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        command:
          type: string
        exitCode:
          type: integer
        executedAt:
          type: string
    ProjectBoardRecord:
      type: object
      additionalProperties: false
      required: [id, name, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    BoardProjectRecord:
      type: object
      additionalProperties: false
      required: [id, boardId, name, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        boardId:
          type: string
        externalProjectId:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    BoardTaskRecord:
      type: object
      additionalProperties: false
      required: [id, projectId, title, content, priority, status, creatorId, createdAt, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
        content:
          type: string
        priority:
          type: integer
        status:
          type: string
        dueDate:
          type: string
          nullable: true
        creatorId:
          type: string
        linkedPr:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
